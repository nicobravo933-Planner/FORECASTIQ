name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Build + Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: []   # agrega "ci" acá cuando el workflow de CI tenga nombre de job reutilizable

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/nicobravo933-planner/forecastiq-backend:latest

      - name: Deploy to Railway
        # Requiere RAILWAY_TOKEN en GitHub Secrets
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            "https://backboard.railway.app/graphql/v2" \
            --fail || echo "Railway deploy trigger — configure webhook in Railway dashboard"

  # Frontend se despliega automáticamente via integración GitHub de Vercel
  # No se necesita paso aquí, Vercel escucha push a main directamente
