# docker-compose.prod.yml — override para EC2 (solo API liviana)
#
# Uso en EC2:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Qué hace este override:
#   - Mueve celery_worker y celery_beat al profile "local"
#   - Sin --profile local, esos servicios no levantan (Compose v2 correcto)
#   - EC2 queda con: backend (FastAPI) + redis únicamente
#
# NOTA: deploy.replicas: 0 es sintaxis Swarm — ignorada por `docker compose`.
# La forma correcta de deshabilitar servicios en Compose es via `profiles:`.

services:
  celery_worker:
    profiles:
      - local

  celery_beat:
    profiles:
      - local
