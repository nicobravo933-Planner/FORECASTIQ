  );
}

      color: "#fff", fontSize: size * 0.38, fontWeight: 600,
      flexShrink: 0,
    }}>{name}</div>
  );
}

function NavItem({ item, active, collapsed, theme }) {
  const [hovered, setHovered] = useState(false);
  const th = THEMES[theme];
  const isDark = th.darkSidebar;
  const isActive = active;

  const activeStyle = {
    background: th.accentBg,
    color: th.accent,
    borderLeft: `3px solid ${th.accent}`,
    fontWeight: 600,
  };
  const hoverStyle = {
    background: isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.03)",
  };

  const baseStyle = {
    display:"flex", alignItems:"center", gap:12,
    padding: collapsed ? "11px 0" : "10px 12px",
    justifyContent: collapsed ? "center" : "flex-start",
    borderRadius: "8px",
    margin: "1px 8px",
    cursor:"pointer", transition:"all 0.15s ease",
    borderLeft: isActive ? undefined : "3px solid transparent",
    color: isActive ? th.accent : (isDark ? "#94a3b8" : "#6b7280"),
    fontSize:14, fontWeight: isActive ? 600 : 400,
    userSelect:"none",
    ...(isActive ? activeStyle : (hovered ? hoverStyle : {})),
  };

  return (
    <div style={baseStyle}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
    >
      <Icon name={item.icon} size={20} style={{ flexShrink:0,
        color: isActive ? th.accent : (isDark ? "#64748b" : "#9ca3af")
      }} />
      {!collapsed && <span>{item.label}</span>}
    </div>
  );
}

function Sidebar({ theme, t, open, activeNav, setActiveNav }) {
  const th = THEMES[theme];
  const isDark = th.darkSidebar;
  const collapsed = !open;
  const divider = isDark ? "rgba(255,255,255,0.06)" : "#f3f4f6";

  return (
    <aside style={{
      width: collapsed ? 64 : (t.sidebarWidth || 240),
      minHeight: "100vh",
      background: th.sidebarBg,
      borderRight: th.sidebarBorder,
      boxShadow: th.sidebarShadow,
      display:"flex", flexDirection:"column",
      transition:"width 0.22s cubic-bezier(0.4,0,0.2,1)",
      overflow:"hidden",
      position:"fixed", top:64, left:0, bottom:0, zIndex:1100,
    }}>

      {/* Sidebar logo (dark sidebar variants) */}
      {isDark && !collapsed && (
        <div style={{ padding:"16px 16px 12px", borderBottom:`1px solid ${divider}` }}>
          <img src="ForecastIQ.png" alt="ForecastIQ"
            style={{ height:30, objectFit:"contain", width:"100%", objectPosition:"left" }} />
        </div>
      )}

      {/* Nav items top */}
      <nav style={{ flex:1, padding:"8px 0", overflowY:"auto", overflowX:"hidden" }}>
        {NAV_ITEMS.map(item => (
          <div key={item.id} onClick={() => setActiveNav(item.id)}>
            <NavItem item={item} active={activeNav === item.id} collapsed={collapsed} theme={theme} />
          </div>
        ))}
      </nav>

      {/* Divider */}
      <div style={{ height:1, background: divider, margin:"0 8px" }} />

      {/* Bottom nav */}
      <div style={{ padding:"8px 0" }}>
        {NAV_BOTTOM.map(item => (
          <div key={item.id} onClick={() => setActiveNav(item.id)}>
            <NavItem item={item} active={activeNav === item.id} collapsed={collapsed} theme={theme} />
          </div>
        ))}
      </div>

      {/* User profile */}
      {!collapsed && (
        <div style={{
          padding:"12px 16px", borderTop:`1px solid ${divider}`,
          display:"flex", alignItems:"center", gap:10, cursor:"pointer",

          <Avatar name="NB" size={34} />
          <div style={{ overflow:"hidden" }}>

          </div>
          <Icon name="chevron_right" size={16}
            style={{ marginLeft:"auto", color: isDark ? "#475569" : "#d1d5db", flexShrink:0 }} />
        </div>
      )}
      {collapsed && (
        <div style={{ padding:"12px 0", display:"flex", justifyContent:"center", borderTop:`1px solid ${divider}` }}>
          <Avatar name="NB" size={32} />

      )}

  );
}

              <div style={{ fontSize:14, fontWeight:600, color:th.pageTitle, marginBottom:4 }}>
                {card.label}
              </div>
              <div style={{ fontSize:12, color:th.pageSubtitle, lineHeight:1.5, flex:1 }}>

        </div>

        <div style={{ display:"flex", flexDirection:"column", minHeight:0 }}>
          <div style={{ fontSize:11, fontWeight:600, color:th.pageMeta,
            letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:12, flexShrink:0 }}>
            Actividad reciente

          <div style={{ flex:1, display:"flex", flexDirection:"column",
            gap:8, overflowY:"auto", minHeight:0 }}>
            {ACTIVITY_ITEMS.map((a,i) => (
              <div key={i} style={{
                background:th.calBg, borderRadius:12, padding:"11px 13px",
                border:`1px solid ${th.calBorder}`,

                <div style={{ minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:600, color:th.pageTitle }}>{a.label}</div>
                  <div style={{ fontSize:11, color:th.pageSubtitle, marginTop:2,
                    whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{a.sub}</div>
                  <div style={{ fontSize:11, color:th.pageMeta, marginTop:2 }}>{a.time}</div>
                </div>
              </div>
            ))}
            <div style={{ padding:"6px 2px", display:"flex", justifyContent:"flex-end", flexShrink:0 }}>
              <span style={{ fontSize:12, fontWeight:600, color:th.accent,
                cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
                Ver todo <Icon name="arrow_forward" size={13} style={{ color:th.accent }} />
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Calendar View ────────────────────────────────────────────────────────────
function CalendarView({ theme }) {
  const th = THEMES[theme];
  const [year, setYear] = useState(2026);
  const [month, setMonth] = useState(4);
  const today = new Date(2026, 4, 23);

  const daysInMonth = getDaysInMonth(year, month);
  const firstDay = getFirstDayOfMonth(year, month);
  const monthEvents = Object.entries(EVENTS).filter(([k]) => k.startsWith(`${year}-${String(month+1).padStart(2,"0")}`));

  const cells = [];
  const prevDays = getDaysInMonth(year, month - 1);
  for (let i = 0; i < firstDay; i++) cells.push({ day: prevDays - firstDay + 1 + i, cur: false });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, cur: true });
  while (cells.length % 7 !== 0) { cells.push({ day: cells.length - daysInMonth - firstDay + 1, cur: false }); }

  const btnStyle = {
    background:"none", border:`1px solid ${th.calBorder}`, cursor:"pointer",
    borderRadius:8, padding:"6px 10px", display:"flex",
    color: th.pageTitle, transition:"border-color 0.15s", fontSize:20, lineHeight:1,
  };

  return (
    <div style={{ display:"flex", gap:20, height:"100%" }}>
      {/* Main calendar */}
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:20 }}>
          <button onClick={() => { if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1); }}
            style={btnStyle}
            onMouseEnter={e=>e.currentTarget.style.borderColor=th.accent}
            onMouseLeave={e=>e.currentTarget.style.borderColor=th.calBorder}
          >‹</button>
          <h2 style={{ fontSize:18, fontWeight:600, color:th.pageTitle, minWidth:160, textAlign:"center" }}>
            {MONTHS_ES[month]} {year}
          </h2>
          <button onClick={() => { if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1); }}
            style={btnStyle}
            onMouseEnter={e=>e.currentTarget.style.borderColor=th.accent}
            onMouseLeave={e=>e.currentTarget.style.borderColor=th.calBorder}
          >›</button>
        </div>

        {/* Grid */}
        <div style={{ background:th.calBg, borderRadius:12, border:`1px solid ${th.calBorder}`,
          boxShadow:"0 1px 3px rgba(0,0,0,0.06)", overflow:"hidden" }}>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)",
            borderBottom:`1px solid ${th.calBorder}`, background:th.calHeaderBg }}>
            {DAYS_ES.map(d => (
              <div key={d} style={{ padding:"10px 0", textAlign:"center",
                fontSize:12, fontWeight:600, color:th.pageMeta, letterSpacing:"0.04em" }}>
                {d.toUpperCase()}
              </div>
            ))}
          </div>
          {Array.from({ length: cells.length / 7 }).map((_, row) => (
            <div key={row} style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)" }}>
              {cells.slice(row*7, row*7+7).map((cell, col) => {
                const dateKey = cell.cur
                  ? `${year}-${String(month+1).padStart(2,"0")}-${String(cell.day).padStart(2,"0")}`
                  : null;
                const evs = dateKey && EVENTS[dateKey] || [];
                const isToday = cell.cur && year===today.getFullYear() && month===today.getMonth() && cell.day===today.getDate();
                const todayBg = th.accentBg;
                return (
                  <div key={col} style={{
                    minHeight:88, padding:"8px 8px 4px",
                    borderRight: col<6 ? `1px solid ${th.calBorder}` : "none",
                    borderBottom: row < cells.length/7-1 ? `1px solid ${th.calBorder}` : "none",
                    background: isToday ? todayBg : "transparent",
                    transition:"background 0.15s", cursor:"pointer",
                  }}
                    onMouseEnter={e => { if(!isToday) e.currentTarget.style.background=th.calHeaderBg; }}
                    onMouseLeave={e => { e.currentTarget.style.background = isToday ? todayBg : "transparent"; }}
                  >
                    <div style={{
                      width:26, height:26, display:"flex", alignItems:"center", justifyContent:"center",
                      borderRadius:"50%", fontSize:13, fontWeight: isToday ? 700 : 400,
                      color: isToday ? "#fff" : cell.cur ? th.pageTitle : th.pageMeta,
                      background: isToday ? th.accent : "transparent",
                      marginBottom:4,
                    }}>{cell.day}</div>
                    {evs.map((ev, i) => (
                      <div key={i} style={{
                        fontSize:11, background: th.accentBg, color: th.accent,
                        borderRadius:4, padding:"2px 6px", marginBottom:2,
                        whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", fontWeight:500,
                      }}>{ev.label}</div>
                    ))}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {/* Events panel */}
      <div style={{ width:240, flexShrink:0 }}>
        <div style={{ fontSize:13, fontWeight:600, color:th.pageSubtitle, marginBottom:12 }}>
          Eventos del mes ({monthEvents.length})
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {monthEvents.map(([date, evs]) => evs.map((ev, i) => (
            <div key={date+i} style={{
              background:th.calBg, borderRadius:10, padding:"12px 14px",
              border:`1px solid ${th.calBorder}`,
              boxShadow:"0 1px 3px rgba(0,0,0,0.04)",
            }}>
              <div style={{ fontSize:13, fontWeight:600, color:th.pageTitle, marginBottom:6 }}>{ev.label}</div>
              <div style={{ display:"flex", gap:6, marginBottom:8 }}>
                <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20,
                  background:th.accentBg, color:th.accent, fontWeight:500 }}>
                  {ev.type}
                </span>
                <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20,
                  background:"#f0fdf4", color:"#16a34a", fontWeight:500 }}>
                  {ev.scope}
                </span>
              </div>
              <div style={{ fontSize:11, color:th.pageMeta }}>{date}</div>
            </div>
          )))}
          {monthEvents.length === 0 && (
            <div style={{ fontSize:13, color:th.pageMeta, padding:"20px 0", textAlign:"center" }}>
              Sin eventos este mes
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────

    "theme": "navyPro",
    "sidebarWidth": 240,
    "logoSize": "md",
    "density": "normal"

  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [activeNav, setActiveNav] = useState("inicio");

  const theme = t.theme || "navyPro";
  const th = THEMES[theme];
  const sidebarW = sidebarOpen ? (t.sidebarWidth || 240) : 64;

  return (
    <div style={{ height:"100vh", overflow:"hidden", background: th.bodyBg, fontFamily:"'Inter',sans-serif" }}>
      <AppHeader theme={theme} t={t} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} />
      <Sidebar theme={theme} t={t} open={sidebarOpen} activeNav={activeNav} setActiveNav={setActiveNav} />

      {/* Main content */}
      <main style={{
        marginLeft: sidebarW,
        marginTop: 64,
        height:"calc(100vh - 64px)",
        overflow:"auto",
        transition:"margin-left 0.22s cubic-bezier(0.4,0,0.2,1)",
        padding: activeNav === "inicio" ? 0 : (t.density === "compact" ? "20px 20px" : "28px 28px"),
        background: th.bodyBg,
      }}>
        {activeNav === "inicio" ? (
          <HomeView theme={theme} setActiveNav={setActiveNav} />
        ) : (
          <>
            {/* Page header */}
            <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:24 }}>
              <div>
                <div style={{ fontSize:11, fontWeight:500, color:th.pageMeta, letterSpacing:"0.06em",
                  textTransform:"uppercase", marginBottom:4 }}>
                  Sábado, 24 de Mayo
                </div>
                <h1 style={{ fontSize:22, fontWeight:700, color:th.pageTitle, letterSpacing:"-0.3px" }}>
                  Calendario de eventos
                </h1>
                <p style={{ fontSize:13, color:th.pageSubtitle, marginTop:4, maxWidth:540 }}>
                  Agregá promociones, feriados y eventos que impactan tus ventas. Los feriados nacionales AR se cargan automáticamente.
                </p>
              </div>
              <button style={{
                display:"flex", alignItems:"center", gap:8,
                background:`linear-gradient(135deg, ${th.accent}, ${th.accentDark})`,
                color:"#fff", border:"none", borderRadius:8, padding:"10px 18px",
                fontSize:13, fontWeight:600, cursor:"pointer",
                boxShadow:`0 2px 8px ${th.accentShadow}`,
                transition:"box-shadow 0.15s, transform 0.15s",
                whiteSpace:"nowrap", flexShrink:0,
              }}
                onMouseEnter={e => { e.currentTarget.style.boxShadow=`0 4px 16px ${th.accentShadow}`; e.currentTarget.style.transform="translateY(-1px)"; }}
                onMouseLeave={e => { e.currentTarget.style.boxShadow=`0 2px 8px ${th.accentShadow}`; e.currentTarget.style.transform="none"; }}
              >
                <Icon name="add" size={18} />
                Nuevo evento
              </button>
            </div>
            <CalendarView theme={theme} />
          </>
        )}
      </main>

      {/* Tweaks Panel */}
      <TweaksPanel>
        <TweakSection title="Tema de color">
          <TweakSelect id="theme" label="Variante"
            options={[
              { value:"navyPro",       label:"🌊 Navy Pro" },
              { value:"blueMui",       label:"🔵 Blue MUI" },
              { value:"slateSidebar",  label:"🪨 Slate Sidebar" },
              { value:"violetAI",      label:"🟣 Violet AI" },
              { value:"emeraldData",   label:"🟢 Emerald Data" },
              { value:"graphiteDark",  label:"⚫ Graphite Dark" },
              { value:"indigoLinear",  label:"💜 Indigo Linear" },
            ]}
            value={t.theme} onChange={v => setTweak("theme", v)}
          />
        </TweakSection>
        <TweakSection title="Sidebar">
          <TweakSlider id="sidebarWidth" label="Ancho" min={200} max={300} step={10}
            value={t.sidebarWidth} onChange={v => setTweak("sidebarWidth", v)} />
        </TweakSection>
        <TweakSection title="Logo">
          <TweakRadio id="logoSize" label="Tamaño"
            options={[{value:"sm",label:"S"},{value:"md",label:"M"},{value:"lg",label:"L"}]}
            value={t.logoSize} onChange={v => setTweak("logoSize", v)}
          />
        </TweakSection>
        <TweakSection title="Densidad">
          <TweakRadio id="density" label="Espaciado"
            options={[{value:"compact",label:"Compacto"},{value:"normal",label:"Normal"}]}
            value={t.density} onChange={v => setTweak("density", v)}
          />
        </TweakSection>

    </div>

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
