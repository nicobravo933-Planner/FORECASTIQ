<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForecastIQ — Layout Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; font-family: 'Inter', sans-serif; }
    body { overflow: hidden; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Theme Definitions ────────────────────────────────────────────────────────
const THEMES = {
  navyPro: {
    label: "Navy Pro",
    headerBg: "linear-gradient(135deg, #0f2044 0%, #1a3868 100%)",
    headerText: "#ffffff",
    headerBorder: "none",
    headerShadow: "0 2px 12px rgba(0,0,0,0.25)",
    sidebarBg: "#ffffff",
    sidebarText: "#374151",
    sidebarBorder: "1px solid #e5e7eb",
    sidebarShadow: "2px 0 8px rgba(0,0,0,0.06)",
    bodyBg: "#f0f4f8",
    logoFilter: "none",
    logoOnHeader: true,
  },
  blueMui: {
    label: "Blue MUI",
    headerBg: "linear-gradient(135deg, #1565C0 0%, #1976D2 100%)",
    headerText: "#ffffff",
    headerBorder: "none",
    headerShadow: "0 2px 10px rgba(21,101,192,0.35)",
    sidebarBg: "#ffffff",
    sidebarText: "#374151",
    sidebarBorder: "1px solid #e5e7eb",
    sidebarShadow: "2px 0 8px rgba(0,0,0,0.06)",
    bodyBg: "#f5f7fa",
    logoFilter: "none",
    logoOnHeader: true,
  },
  slateSidebar: {
    label: "Slate Sidebar",
    headerBg: "#ffffff",
    headerText: "#111827",
    headerBorder: "1px solid #e5e7eb",
    headerShadow: "0 1px 4px rgba(0,0,0,0.08)",
    sidebarBg: "#1e293b",
    sidebarText: "#cbd5e1",
    sidebarBorder: "none",
    sidebarShadow: "2px 0 12px rgba(0,0,0,0.2)",
    bodyBg: "#f4f6f8",
    logoFilter: "brightness(0) invert(0.2) sepia(1) saturate(5) hue-rotate(190deg)",
    logoOnHeader: false,
  },
};

// ─── Nav Items ────────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { id: "datasets",   label: "Mis Datasets",  icon: "storage" },
  { id: "csv",        label: "Subir CSV",     icon: "upload_file" },
  { id: "forecast",   label: "Forecast",      icon: "trending_up" },
  { id: "calendario", label: "Calendario",    icon: "calendar_month" },
  { id: "chatia",     label: "Chat IA",       icon: "smart_toy" },
  { id: "mlops",      label: "MLOps",         icon: "model_training" },
  { id: "batch",      label: "Batch",         icon: "bar_chart" },
];
const NAV_BOTTOM = [
  { id: "ajustes", label: "Ajustes", icon: "settings" },
];

// ─── Calendar helpers ─────────────────────────────────────────────────────────
const DAYS_ES = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

const EVENTS = {
  "2026-05-01": [{ label: "Día del Trabajo", type: "Feriado", scope: "Global" }],
  "2026-05-25": [{ label: "Día de la Revolución de Mayo", type: "Feriado", scope: "Global" }],
};

function getDaysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}
function getFirstDayOfMonth(year, month) {
  return new Date(year, month, 1).getDay();
}

// ─── Components ───────────────────────────────────────────────────────────────

function Icon({ name, size = 20, style = {} }) {
  return (
    <span className="material-icons-round" style={{ fontSize: size, ...style, userSelect: "none" }}>
      {name}
    </span>
  );
}

function Avatar({ name = "NB", size = 36 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: "linear-gradient(135deg, #3b82f6, #06b6d4)",
      display: "flex", alignItems: "center", justifyContent: "center",
      color: "#fff", fontSize: size * 0.38, fontWeight: 600,
      flexShrink: 0,
    }}>{name}</div>
  );
}

function AppHeader({ theme, t, sidebarOpen, setSidebarOpen }) {
  const th = THEMES[theme];
  return (
    <header style={{
      height: 64, display: "flex", alignItems: "center",
      background: th.headerBg,
      borderBottom: th.headerBorder,
      boxShadow: th.headerShadow,
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 1200,
      padding: "0 16px",
    }}>
      {/* Left: hamburger */}
      <button onClick={() => setSidebarOpen(v => !v)}
        style={{ background:"none", border:"none", cursor:"pointer",
          color: th.headerText, display:"flex", alignItems:"center",
          padding: 8, borderRadius: 8, marginRight: 8,
          opacity: 0.75, transition: "opacity 0.15s",
        }}
        onMouseEnter={e => e.currentTarget.style.opacity="1"}
        onMouseLeave={e => e.currentTarget.style.opacity="0.75"}
      >
        <Icon name="menu" size={22} />
      </button>

      {/* Center: Logo */}
      <div style={{ flex:1, display:"flex", justifyContent:"center", alignItems:"center" }}>
        {th.logoOnHeader ? (
          <img src="ForecastIQ.png" alt="ForecastIQ"
            style={{ height: t.logoSize === "sm" ? 32 : t.logoSize === "lg" ? 44 : 38, objectFit:"contain", filter: th.logoFilter }} />
        ) : (
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <img src="logo_rectangular.png" alt="ForecastIQ"
              style={{ height: 36, objectFit:"contain",
                filter:"brightness(0) saturate(100%) invert(42%) sepia(93%) saturate(1352%) hue-rotate(195deg) brightness(99%) contrast(103%)",
                clipPath:"inset(0 72% 0 0)"
              }} />
            <div>
              <div style={{ fontSize:16, fontWeight:700, color:"#111827", letterSpacing:"-0.3px" }}>ForecastIQ</div>
              <div style={{ fontSize:10, color:"#6b7280", letterSpacing:"0.12em", fontWeight:500, marginTop:-1 }}>ML · FORECAST · AI</div>
            </div>
          </div>
        )}
      </div>

      {/* Right: actions */}
      <div style={{ display:"flex", alignItems:"center", gap:4 }}>
        <button style={{ background:"none", border:"none", cursor:"pointer",
          color: th.headerText, opacity:0.75, display:"flex", alignItems:"center",
          padding:8, borderRadius:8, transition:"opacity 0.15s" }}
          onMouseEnter={e => e.currentTarget.style.opacity="1"}
          onMouseLeave={e => e.currentTarget.style.opacity="0.75"}
        >
          <Icon name="notifications" size={22} />
        </button>
        <button style={{ background:"none", border:"none", cursor:"pointer",
          padding:4, borderRadius:"50%", display:"flex", alignItems:"center" }}>
          <Avatar name="NB" size={34} />
        </button>
      </div>
    </header>
  );
}

function NavItem({ item, active, collapsed, theme }) {
  const [hovered, setHovered] = useState(false);
  const th = THEMES[theme];
  const isDarkSidebar = theme === "slateSidebar";
  const isActive = active;

  const activeStyle = isDarkSidebar
    ? { background:"rgba(59,130,246,0.18)", color:"#60a5fa", borderLeft:"3px solid #3b82f6" }
    : { background:"rgba(59,130,246,0.08)", color:"#2563eb", borderLeft:"3px solid #3b82f6" };

  const hoverStyle = isDarkSidebar
    ? { background:"rgba(255,255,255,0.06)" }
    : { background:"rgba(59,130,246,0.04)" };

  const baseStyle = {
    display:"flex", alignItems:"center", gap:12,
    padding: collapsed ? "11px 0" : "10px 12px",
    justifyContent: collapsed ? "center" : "flex-start",
    borderRadius: collapsed ? "10px" : "8px",
    margin: collapsed ? "2px 8px" : "1px 8px",
    cursor:"pointer", transition:"all 0.15s ease",
    borderLeft: isActive ? undefined : "3px solid transparent",
    color: isActive ? undefined : (isDarkSidebar ? "#94a3b8" : "#6b7280"),
    fontSize:14, fontWeight: isActive ? 600 : 400,
    userSelect:"none",
    ...(isActive ? activeStyle : (hovered ? hoverStyle : {})),
  };

  return (
    <div style={baseStyle}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
    >
      <Icon name={item.icon} size={20} style={{ flexShrink:0,
        color: isActive ? (isDarkSidebar ? "#60a5fa" : "#2563eb") : (isDarkSidebar ? "#94a3b8" : "#9ca3af")
      }} />
      {!collapsed && <span>{item.label}</span>}
    </div>
  );
}

function Sidebar({ theme, t, open, activeNav, setActiveNav }) {
  const th = THEMES[theme];
  const isDarkSidebar = theme === "slateSidebar";
  const collapsed = !open;

  return (
    <aside style={{
      width: collapsed ? 64 : (t.sidebarWidth || 240),
      minHeight: "100vh",
      background: th.sidebarBg,
      borderRight: th.sidebarBorder,
      boxShadow: th.sidebarShadow,
      display:"flex", flexDirection:"column",
      transition:"width 0.22s cubic-bezier(0.4,0,0.2,1)",
      overflow:"hidden",
      position:"fixed", top:64, left:0, bottom:0, zIndex:1100,
    }}>

      {/* Sidebar logo (slate variant) */}
      {isDarkSidebar && !collapsed && (
        <div style={{ padding:"16px 16px 8px", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
          <img src="logo_rectangular.png" alt="ForecastIQ"
            style={{ height:32, objectFit:"contain", width:"100%", objectPosition:"left" }} />
        </div>
      )}

      {/* Nav items top */}
      <nav style={{ flex:1, padding: "8px 0", overflowY:"auto", overflowX:"hidden" }}>
        {NAV_ITEMS.map(item => (
          <div key={item.id} onClick={() => setActiveNav(item.id)}>
            <NavItem item={item} active={activeNav === item.id} collapsed={collapsed} theme={theme} />
          </div>
        ))}
      </nav>

      {/* Divider */}
      <div style={{ height:1, background: isDarkSidebar ? "rgba(255,255,255,0.06)" : "#f3f4f6", margin:"0 8px" }} />

      {/* Bottom nav */}
      <div style={{ padding:"8px 0" }}>
        {NAV_BOTTOM.map(item => (
          <div key={item.id} onClick={() => setActiveNav(item.id)}>
            <NavItem item={item} active={activeNav === item.id} collapsed={collapsed} theme={theme} />
          </div>
        ))}
      </div>

      {/* User profile */}
      {!collapsed && (
        <div style={{
          padding:"12px 16px", borderTop: isDarkSidebar ? "1px solid rgba(255,255,255,0.06)" : "1px solid #f3f4f6",
          display:"flex", alignItems:"center", gap:10, cursor:"pointer",
        }}>
          <Avatar name="NB" size={34} />
          <div style={{ overflow:"hidden" }}>
            <div style={{ fontSize:13, fontWeight:600, color: isDarkSidebar ? "#e2e8f0" : "#111827",
              whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>Nicolás Bravo</div>
            <div style={{ fontSize:11, color: isDarkSidebar ? "#64748b" : "#9ca3af", marginTop:1 }}>Ver perfil</div>
          </div>
          <Icon name="chevron_right" size={16} style={{ marginLeft:"auto", color: isDarkSidebar ? "#475569" : "#d1d5db", flexShrink:0 }} />
        </div>
      )}
      {collapsed && (
        <div style={{ padding:"12px 0", display:"flex", justifyContent:"center", borderTop: isDarkSidebar ? "1px solid rgba(255,255,255,0.06)" : "1px solid #f3f4f6" }}>
          <Avatar name="NB" size={32} />
        </div>
      )}
    </aside>
  );
}

// ─── Calendar View ────────────────────────────────────────────────────────────
function CalendarView({ t }) {
  const [year, setYear] = useState(2026);
  const [month, setMonth] = useState(4); // Mayo = index 4
  const today = new Date(2026, 4, 23);

  const daysInMonth = getDaysInMonth(year, month);
  const firstDay = getFirstDayOfMonth(year, month);
  const monthEvents = Object.entries(EVENTS).filter(([k]) => k.startsWith(`${year}-${String(month+1).padStart(2,"0")}`));

  const cells = [];
  const prevDays = getDaysInMonth(year, month - 1);
  for (let i = 0; i < firstDay; i++) cells.push({ day: prevDays - firstDay + 1 + i, cur: false });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, cur: true });
  while (cells.length % 7 !== 0) { cells.push({ day: cells.length - daysInMonth - firstDay + 1, cur: false }); }

  return (
    <div style={{ display:"flex", gap:20, height:"100%" }}>
      {/* Main calendar */}
      <div style={{ flex:1, minWidth:0 }}>
        {/* Month nav */}
        <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:20 }}>
          <button onClick={() => { if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1); }}
            style={{ background:"none", border:"1px solid #e5e7eb", cursor:"pointer",
              borderRadius:8, padding:"6px 10px", display:"flex", color:"#374151",
              transition:"border-color 0.15s", fontSize:20, lineHeight:1, }}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#3b82f6"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#e5e7eb"}
          >‹</button>
          <h2 style={{ fontSize:18, fontWeight:600, color:"#111827", minWidth:160, textAlign:"center" }}>
            {MONTHS_ES[month]} {year}
          </h2>
          <button onClick={() => { if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1); }}
            style={{ background:"none", border:"1px solid #e5e7eb", cursor:"pointer",
              borderRadius:8, padding:"6px 10px", display:"flex", color:"#374151",
              transition:"border-color 0.15s", fontSize:20, lineHeight:1, }}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#3b82f6"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#e5e7eb"}
          >›</button>
        </div>

        {/* Grid */}
        <div style={{ background:"#fff", borderRadius:12, border:"1px solid #e5e7eb",
          boxShadow:"0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)", overflow:"hidden" }}>
          {/* Header row */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)",
            borderBottom:"1px solid #f3f4f6", background:"#fafafa" }}>
            {DAYS_ES.map(d => (
              <div key={d} style={{ padding:"10px 0", textAlign:"center",
                fontSize:12, fontWeight:600, color:"#9ca3af", letterSpacing:"0.04em" }}>
                {d.toUpperCase()}
              </div>
            ))}
          </div>
          {/* Cells */}
          {Array.from({ length: cells.length / 7 }).map((_, row) => (
            <div key={row} style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)" }}>
              {cells.slice(row*7, row*7+7).map((cell, col) => {
                const dateKey = cell.cur
                  ? `${year}-${String(month+1).padStart(2,"0")}-${String(cell.day).padStart(2,"0")}`
                  : null;
                const evs = dateKey && EVENTS[dateKey] || [];
                const isToday = cell.cur && year===today.getFullYear() && month===today.getMonth() && cell.day===today.getDate();
                return (
                  <div key={col} style={{
                    minHeight:88, padding:"8px 8px 4px",
                    borderRight: col<6 ? "1px solid #f3f4f6" : "none",
                    borderBottom: row < cells.length/7-1 ? "1px solid #f3f4f6" : "none",
                    background: isToday ? "rgba(59,130,246,0.04)" : "transparent",
                    transition:"background 0.15s",
                    cursor:"pointer",
                  }}
                    onMouseEnter={e => { if(!isToday) e.currentTarget.style.background="rgba(0,0,0,0.015)"; }}
                    onMouseLeave={e => { e.currentTarget.style.background = isToday ? "rgba(59,130,246,0.04)" : "transparent"; }}
                  >
                    <div style={{
                      width:26, height:26, display:"flex", alignItems:"center", justifyContent:"center",
                      borderRadius:"50%", fontSize:13, fontWeight: isToday ? 700 : 400,
                      color: isToday ? "#fff" : cell.cur ? "#374151" : "#d1d5db",
                      background: isToday ? "#3b82f6" : "transparent",
                      marginBottom:4,
                    }}>{cell.day}</div>
                    {evs.map((ev, i) => (
                      <div key={i} style={{
                        fontSize:11, background: "#dbeafe", color:"#1d4ed8",
                        borderRadius:4, padding:"2px 6px", marginBottom:2,
                        whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                        fontWeight:500,
                      }}>{ev.label}</div>
                    ))}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {/* Events panel */}
      <div style={{ width:240, flexShrink:0 }}>
        <div style={{ fontSize:13, fontWeight:600, color:"#374151", marginBottom:12 }}>
          Eventos del mes ({monthEvents.length})
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {monthEvents.map(([date, evs]) => evs.map((ev, i) => (
            <div key={date+i} style={{
              background:"#fff", borderRadius:10, padding:"12px 14px",
              border:"1px solid #e5e7eb",
              boxShadow:"0 1px 3px rgba(0,0,0,0.04)",
            }}>
              <div style={{ fontSize:13, fontWeight:600, color:"#111827", marginBottom:6 }}>{ev.label}</div>
              <div style={{ display:"flex", gap:6, marginBottom:8 }}>
                <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20,
                  background:"#eff6ff", color:"#3b82f6", border:"1px solid #bfdbfe", fontWeight:500 }}>
                  {ev.type}
                </span>
                <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20,
                  background:"#f0fdf4", color:"#16a34a", border:"1px solid #bbf7d0", fontWeight:500 }}>
                  {ev.scope}
                </span>
              </div>
              <div style={{ fontSize:11, color:"#9ca3af" }}>{date}</div>
            </div>
          )))}
          {monthEvents.length === 0 && (
            <div style={{ fontSize:13, color:"#9ca3af", padding:"20px 0", textAlign:"center" }}>
              Sin eventos este mes
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "navyPro",
    "sidebarWidth": 240,
    "logoSize": "md",
    "density": "normal"
  }/*EDITMODE-END*/;

  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [activeNav, setActiveNav] = useState("calendario");

  const theme = t.theme || "navyPro";
  const th = THEMES[theme];
  const sidebarW = sidebarOpen ? (t.sidebarWidth || 240) : 64;

  return (
    <div style={{ height:"100vh", overflow:"hidden", background: th.bodyBg, fontFamily:"'Inter',sans-serif" }}>
      <AppHeader theme={theme} t={t} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} />
      <Sidebar theme={theme} t={t} open={sidebarOpen} activeNav={activeNav} setActiveNav={setActiveNav} />

      {/* Main content */}
      <main style={{
        marginLeft: sidebarW,
        marginTop: 64,
        height:"calc(100vh - 64px)",
        overflow:"auto",
        transition:"margin-left 0.22s cubic-bezier(0.4,0,0.2,1)",
        padding: t.density === "compact" ? "20px 20px" : "28px 28px",
      }}>
        {/* Page header */}
        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:24 }}>
          <div>
            <div style={{ fontSize:11, fontWeight:500, color:"#9ca3af", letterSpacing:"0.06em",
              textTransform:"uppercase", marginBottom:4 }}>
              Sábado, 23 de Mayo
            </div>
            <h1 style={{ fontSize:22, fontWeight:700, color:"#111827", letterSpacing:"-0.3px" }}>
              Calendario de eventos
            </h1>
            <p style={{ fontSize:13, color:"#6b7280", marginTop:4, maxWidth:540 }}>
              Agregá promociones, feriados y eventos que impactan tus ventas. Los feriados nacionales AR se cargan automáticamente.
            </p>
          </div>
          <button style={{
            display:"flex", alignItems:"center", gap:8,
            background:"linear-gradient(135deg,#3b82f6,#2563eb)",
            color:"#fff", border:"none", borderRadius:8, padding:"10px 18px",
            fontSize:13, fontWeight:600, cursor:"pointer",
            boxShadow:"0 2px 8px rgba(59,130,246,0.35)",
            transition:"box-shadow 0.15s, transform 0.15s",
            whiteSpace:"nowrap", flexShrink:0,
          }}
            onMouseEnter={e => { e.currentTarget.style.boxShadow="0 4px 16px rgba(59,130,246,0.45)"; e.currentTarget.style.transform="translateY(-1px)"; }}
            onMouseLeave={e => { e.currentTarget.style.boxShadow="0 2px 8px rgba(59,130,246,0.35)"; e.currentTarget.style.transform="none"; }}
          >
            <Icon name="add" size={18} />
            Nuevo evento
          </button>
        </div>

        <CalendarView t={t} />
      </main>

      {/* Tweaks Panel */}
      <TweaksPanel>
        <TweakSection title="Tema">
          <TweakSelect id="theme" label="Variante"
            options={[
              { value:"navyPro",      label:"Navy Pro" },
              { value:"blueMui",      label:"Blue MUI" },
              { value:"slateSidebar", label:"Slate Sidebar" },
            ]}
            value={t.theme} onChange={v => setTweak("theme", v)}
          />
        </TweakSection>
        <TweakSection title="Sidebar">
          <TweakSlider id="sidebarWidth" label="Ancho" min={200} max={300} step={10}
            value={t.sidebarWidth} onChange={v => setTweak("sidebarWidth", v)} />
        </TweakSection>
        <TweakSection title="Header logo">
          <TweakRadio id="logoSize" label="Tamaño logo"
            options={[{value:"sm",label:"S"},{value:"md",label:"M"},{value:"lg",label:"L"}]}
            value={t.logoSize} onChange={v => setTweak("logoSize", v)}
          />
        </TweakSection>
        <TweakSection title="Densidad">
          <TweakRadio id="density" label="Espaciado"
            options={[{value:"compact",label:"Compacto"},{value:"normal",label:"Normal"}]}
            value={t.density} onChange={v => setTweak("density", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
